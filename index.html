<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Homo Moaning Emulator</title>
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;700;800&display=swap"
        rel="stylesheet">
    <style>
        :root {
            --bg-color: #f3f4f6;
            --panel-bg: #ffffff;
            --text-color: #111827;
            --primary: #000000;
            --primary-hover: #374151;
            --danger: #dc2626;
            --danger-hover: #b91c1c;
            --border-color: #d1d5db;
        }

        body {
            margin: 0;
            padding: 40px 20px;
            font-family: 'JetBrains Mono', Consolas, 'Courier New', monospace;
            background: var(--bg-color);
            color: var(--text-color);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
            box-sizing: border-box;
        }

        .main-title {
            margin: 0 0 40px 0;
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            color: var(--primary);
            letter-spacing: -1px;
        }

        .main-layout {
            display: flex;
            flex-direction: column;
            gap: 30px;
            width: 100%;
            max-width: 1200px;
        }

        @media (min-width: 768px) {
            .main-layout {
                flex-direction: row;
                align-items: flex-start;
            }
        }

        .container {
            background: var(--panel-bg);
            border: 2px solid var(--primary);
            padding: 30px;
            width: 100%;
            flex: 1;
            box-sizing: border-box;
            box-shadow: 8px 8px 0px rgba(0, 0, 0, 0.1);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
        }

        select {
            width: 100%;
            padding: 12px 16px;
            border-radius: 0;
            background: #ffffff;
            border: 2px solid var(--border-color);
            color: var(--text-color);
            font-size: 15px;
            font-weight: 500;
            outline: none;
            cursor: pointer;
            transition: border-color 0.2s;
            appearance: none;
        }

        .select-wrapper {
            position: relative;
        }

        .select-wrapper::after {
            content: "▼";
            font-size: 12px;
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--primary);
            pointer-events: none;
        }

        select:focus {
            border-color: var(--primary);
        }

        button {
            width: 100%;
            padding: 16px;
            border-radius: 0;
            border: 2px solid var(--primary);
            background: var(--primary);
            color: white;
            font-size: 16px;
            font-weight: 700;
            text-transform: uppercase;
            cursor: pointer;
            transition: all 0.2s ease;
            margin-top: 10px;
        }

        button:hover {
            background: var(--panel-bg);
            color: var(--primary);
        }

        button:active {
            transform: translateY(2px);
        }

        button.playing {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        button.playing:hover {
            background: var(--panel-bg);
            color: var(--danger);
        }

        .track-container {
            background: #f9fafb;
            border: 2px solid var(--border-color);
            padding: 20px;
            margin-bottom: 24px;
        }

        .track-title {
            margin: 0 0 16px 0;
            font-size: 15px;
            font-weight: 800;
            color: var(--primary);
            border-bottom: 2px solid var(--primary);
            padding-bottom: 8px;
        }

        .track-container .form-group:last-child {
            margin-bottom: 0;
        }

        .loop-section {
            margin-top: 0;
        }

        .loop-group-block {
            background: #ffffff;
            padding: 16px;
            margin-bottom: 16px;
            border: 2px solid var(--border-color);
            transition: all 0.2s ease;
        }

        .loop-group-block.active {
            border-color: var(--primary);
            background: #f3f4f6;
        }

        .slider-group {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .slider-group input[type="range"] {
            flex: 1;
            accent-color: var(--primary);
            height: 4px;
            background: var(--border-color);
            appearance: none;
            outline: none;
        }

        .slider-group input[type="range"]::-webkit-slider-thumb {
            appearance: none;
            width: 16px;
            height: 16px;
            background: var(--primary);
            cursor: pointer;
            border-radius: 0;
        }

        .slider-value {
            font-size: 14px;
            font-weight: 700;
            color: var(--primary);
            min-width: 40px;
            text-align: right;
        }

        .execute-btn {
            background: #ffffff;
            color: var(--primary);
            border: 2px solid var(--primary);
        }

        .execute-btn:hover {
            background: var(--primary);
            color: #ffffff;
        }

        .execute-btn.playing {
            background: var(--danger);
            border-color: var(--danger);
            color: white;
        }

        .execute-btn.playing:hover {
            background: #ffffff;
            color: var(--danger);
        }

        .presets-card {
            display: flex;
            flex-direction: column;
            gap: 16px;
            flex: 0.5;
            min-width: 200px;
        }

        .presets-card button {
            margin: 0;
            background: transparent;
            color: var(--primary);
        }

        .presets-card button:hover {
            background: var(--primary);
            color: #ffffff;
        }

        /* Ripple Effect */
        #ripple-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            pointer-events: none;
            overflow: hidden;
            z-index: -1;
        }

        .ripple {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            border-radius: 50%;
            border: solid #000000;
            pointer-events: none;
            animation: ripple-anim 1.5s cubic-bezier(0.1, 0.8, 0.3, 1) forwards;
        }

        @keyframes ripple-anim {
            0% {
                width: 1000px;
                height: 1000px;
                bottom: -3020px;
                border-width: 1000px;
                opacity: 1;
            }

            100% {
                width: 5000px;
                height: 5000px;
                bottom: -3020px;
                border-width: 5px;
                opacity: 0;
            }
        }

        /* Shake Effect */
        @keyframes shake {
            0% {
                transform: translate(0, 0);
            }

            20% {
                transform: translate(-2px, 2px);
            }

            40% {
                transform: translate(2px, -2px);
            }

            60% {
                transform: translate(-2px, -1px);
            }

            80% {
                transform: translate(1px, 2px);
            }

            100% {
                transform: translate(0, 0);
            }
        }

        .shake-active {
            animation: shake 0.2s cubic-bezier(.36, .07, .19, .97) both;
        }

        /* Cache Button Styles */
        .cache-container {
            width: 100%;
            max-width: 1200px;
            margin-bottom: 30px;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 12px;
        }

        .cache-btn {
            width: auto;
            min-width: 280px;
            padding: 14px 28px;
            background: #ffffff;
            color: var(--primary);
            border: 3px solid var(--primary);
            font-weight: 800;
            box-shadow: 4px 4px 0px var(--primary);
            margin-top: 0;
            cursor: pointer;
            transition: all 0.1s ease;
        }

        .cache-btn:hover {
            background: var(--primary);
            color: #ffffff;
            box-shadow: 0px 0px 0px var(--primary);
            transform: translate(4px, 4px);
        }

        .cache-btn:disabled {
            background: #e5e7eb;
            border-color: #94a3b8;
            color: #94a3b8;
            cursor: not-allowed;
            box-shadow: none;
            transform: none;
        }

        .cache-status {
            font-size: 13px;
            font-weight: 700;
            color: var(--primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
    </style>
</head>

<body>
    <div id="ripple-container"></div>

    <h1 class="main-title">Homo Moaning Emulator</h1>

    <div class="cache-container">
        <button id="cacheBtn" class="cache-btn">一键缓存所有音频 (Cache All Audio)</button>
        <div id="cacheStatus" class="cache-status"></div>
    </div>

    <div class="main-layout">
        <div class="container normal-play-card">
            <h3 class="track-title" style="margin-top:0;">基础功能: 正常播放</h3>

            <div class="track-container">
                <h3 class="track-title">击打 (Plaps)</h3>
                <div class="form-group">
                    <label for="voiceSelect1">拍打音 (Plap Sound)</label>
                    <div class="select-wrapper">
                        <select id="voiceSelect1">
                            <option value="plaps" selected>开启 (Enabled)</option>
                            <option value="disabled">禁用 (Disabled)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="freqSelect1">频率 1 (Frequency 1)</label>
                    <div class="select-wrapper">
                        <select id="freqSelect1">
                            <option value="0.15">每 0.15 秒 (0.15s)</option>
                            <option value="0.3">每 0.3 秒 (0.3s)</option>
                            <option value="0.6">每 0.6 秒 (0.6s)</option>
                            <option value="0.9">每 0.9 秒 (0.9s)</option>
                            <option value="1.2">每 1.2 秒 (1.2s)</option>
                            <option value="1.5">每 1.5 秒 (1.5s)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>音量 (Volume)</label>
                    <div class="slider-group">
                        <input type="range" id="volSelect1" min="0" max="100" value="100" step="1"
                            oninput="document.getElementById('volVal1').textContent = this.value + '%'">
                        <span class="slider-value" id="volVal1">100%</span>
                    </div>
                </div>
            </div>

            <div class="track-container">
                <h3 class="track-title">角色 A (Character A)</h3>
                <div class="form-group">
                    <label for="voiceSelect2">角色 A 嗓音 (Voice A)</label>
                    <div class="select-wrapper">
                        <select id="voiceSelect2">
                            <option value="1">Voice 1</option>
                            <option value="2">Voice 2</option>
                            <option value="3">Voice 3</option>
                            <option value="4" selected>Voice 4</option>
                            <option value="5">Voice 5</option>
                            <option value="6">Voice 6</option>
                            <option value="7">Voice 7</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="freqSelect2">跟随频率 (Follow Freq)</label>
                    <div class="select-wrapper">
                        <select id="freqSelect2">
                            <option value="1">1/1 (同步)</option>
                            <option value="2">1/2 (两拍一次)</option>
                            <option value="3">1/3 (三拍一次)</option>
                            <option value="4">1/4 (四拍一次)</option>
                            <option value="5">1/5 (五拍一次)</option>
                            <option value="6">1/6 (六拍一次)</option>
                            <option value="random_high">高频随机 (High Freq Random)</option>
                            <option value="random_low">低频随机 (Low Freq Random)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>音量 (Volume)</label>
                    <div class="slider-group">
                        <input type="range" id="volSelect2" min="0" max="100" value="100" step="1"
                            oninput="document.getElementById('volVal2').textContent = this.value + '%'">
                        <span class="slider-value" id="volVal2">100%</span>
                    </div>
                </div>
            </div>

            <div class="track-container">
                <h3 class="track-title">角色 B (Character B)</h3>
                <div class="form-group">
                    <label for="voiceSelect3">角色 B 嗓音 (Voice B)</label>
                    <div class="select-wrapper">
                        <select id="voiceSelect3">
                            <option value="disabled">禁用 (Disabled)</option>
                            <option value="1">Voice 1</option>
                            <option value="2">Voice 2</option>
                            <option value="3">Voice 3</option>
                            <option value="4">Voice 4</option>
                            <option value="5">Voice 5</option>
                            <option value="6" selected>Voice 6</option>
                            <option value="7">Voice 7</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="freqSelect3">跟随频率 (Follow Freq)</label>
                    <div class="select-wrapper">
                        <select id="freqSelect3">
                            <option value="1">1/1 (同步)</option>
                            <option value="2">1/2 (两拍一次)</option>
                            <option value="3">1/3 (三拍一次)</option>
                            <option value="4">1/4 (四拍一次)</option>
                            <option value="5">1/5 (五拍一次)</option>
                            <option value="6">1/6 (六拍一次)</option>
                            <option value="random_high">高频随机 (High Freq Random)</option>
                            <option value="random_low">低频随机 (Low Freq Random)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label>音量 (Volume)</label>
                    <div class="slider-group">
                        <input type="range" id="volSelect3" min="0" max="100" value="100" step="1"
                            oninput="document.getElementById('volVal3').textContent = this.value + '%'">
                        <span class="slider-value" id="volVal3">100%</span>
                    </div>
                </div>
            </div>

            <button id="playBtn">正常播放 (Normal Play)</button>
        </div>

        <div class="container advanced-play-card">
            <h3 class="track-title" style="margin-top:0;">高级功能: 循环组</h3>
            <div class="form-group">
                <label for="loopCountSelect">选择循环组数量</label>
                <div class="select-wrapper">
                    <select id="loopCountSelect">
                        <option value="2" selected>2 个循环组</option>
                        <option value="3">3 个循环组</option>
                        <option value="4">4 个循环组</option>
                    </select>
                </div>
            </div>

            <div id="loopGroupsContainer">
                <!-- Dynamically generated loop groups -->
            </div>

            <button id="executeLoopBtn" class="execute-btn">执行循环 (Execute Loop)</button>
        </div>

        <div class="presets-card">
            <button id="presetA">预设 A - 快速</button>
            <button id="presetB">预设 B - 慢速</button>
            <button id="presetC">预设 C - 快慢循环</button>
        </div>
    </div>

    <script>
        // Audio file configuration based on directory contents
        const voiceData = {
            "1": { ext: "mp3", count: 15 },
            "2": { ext: "wav", count: 20 },
            "3": { ext: "mp3", count: 23 },
            "4": { ext: "wav", count: 20 },
            "5": { ext: "mp3", count: 13 },
            "6": { ext: "mp3", count: 20 },
            "7": { ext: "mp3", count: 19 }
        };

        let isPlaying = false;
        let isLoopMode = false;
        let mainTimerId = null;
        let tickCount = 0;

        // Caching Logic
        async function cacheAllAudio() {
            const cacheName = 'homo-moaning-emulator-cache-v1';
            const cacheBtn = document.getElementById('cacheBtn');
            const cacheStatus = document.getElementById('cacheStatus');

            cacheBtn.disabled = true;
            cacheBtn.textContent = '正在缓存... (Caching...)';

            const urls = [];
            // Voices
            for (const [id, data] of Object.entries(voiceData)) {
                for (let i = 1; i <= data.count; i++) {
                    urls.push(`Voice/${id}/${id}_${i}.${data.ext}`);
                }
            }
            // Plaps
            for (let i = 1; i <= 23; i++) {
                urls.push(`plaps/plap_${i}.wav`);
            }

            let cachedCount = 0;
            const total = urls.length;

            try {
                const cache = await caches.open(cacheName);
                for (const url of urls) {
                    try {
                        // Check if already in cache to avoid redundant network requests
                        const match = await cache.match(url);
                        if (!match) {
                            await cache.add(url);
                        }
                        cachedCount++;
                        const percent = Math.round((cachedCount / total) * 100);
                        cacheStatus.textContent = `进度: ${percent}% (${cachedCount}/${total})`;
                    } catch (err) {
                        console.warn(`Failed to cache ${url}:`, err);
                    }
                }
                cacheBtn.textContent = '缓存完成 (Cached)';
                cacheStatus.textContent = `成功缓存 ${cachedCount} 个资源！ (Ready)`;
                setTimeout(() => {
                    cacheStatus.textContent = '';
                    cacheBtn.disabled = false;
                    cacheBtn.textContent = '更新/重新缓存 (Update Cache)';
                }, 3000);
            } catch (err) {
                console.error('Cache API error:', err);
                cacheBtn.disabled = false;
                cacheBtn.textContent = '一键缓存 (Cache All)';
                cacheStatus.textContent = '缓存失败，请检查网络或浏览器支持。';
            }
        }

        document.getElementById('cacheBtn').addEventListener('click', cacheAllAudio);

        let lastPlayed = { 1: null, 2: null, 3: null };
        let nextTickTarget = { 2: 0, 3: 0 };

        // Loop Mode States
        let currentLoopIndex = 0;
        let loopTimeRemainingMs = 0;

        const playBtn = document.getElementById('playBtn');
        const executeLoopBtn = document.getElementById('executeLoopBtn');

        const loopCountSelect = document.getElementById('loopCountSelect');
        const loopGroupsContainer = document.getElementById('loopGroupsContainer');

        const elements = {
            1: {
                voiceSelect: document.getElementById('voiceSelect1'),
                freqSelect: document.getElementById('freqSelect1'),
                volSelect: document.getElementById('volSelect1')
            },
            2: {
                voiceSelect: document.getElementById('voiceSelect2'),
                freqSelect: document.getElementById('freqSelect2'),
                volSelect: document.getElementById('volSelect2')
            },
            3: {
                voiceSelect: document.getElementById('voiceSelect3'),
                freqSelect: document.getElementById('freqSelect3'),
                volSelect: document.getElementById('volSelect3')
            }
        };

        function generateLoopGroups() {
            const count = parseInt(loopCountSelect.value, 10);
            loopGroupsContainer.innerHTML = '';
            for (let i = 0; i < count; i++) {
                const block = document.createElement('div');
                block.className = 'loop-group-block';
                block.id = `loopBlock_${i}`;
                block.innerHTML = `
                <div style="font-size:13px; font-weight:600; margin-bottom:12px; color:#94a3b8;">循环组 ${i + 1}</div>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label>持续时间 (Duration)</label>
                    <div class="slider-group">
                        <input type="range" id="loopDuration_${i}" min="5" max="60" value="10" step="1" oninput="document.getElementById('loopDurationVal_${i}').textContent = this.value + 's'">
                        <span class="slider-value" id="loopDurationVal_${i}">10s</span>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label>轨道 1 频率 (Track 1 Freq)</label>
                    <div class="select-wrapper">
                        <select id="loopFreq_${i}">
                            <option value="0.15">每 0.15 秒 (0.15s)</option>
                            <option value="0.3">每 0.3 秒 (0.3s)</option>
                            <option value="0.6">每 0.6 秒 (0.6s)</option>
                            <option value="0.9" selected>每 0.9 秒 (0.9s)</option>
                            <option value="1.2">每 1.2 秒 (1.2s)</option>
                            <option value="1.5">每 1.5 秒 (1.5s)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 12px;">
                    <label>角色 A 嗓音跟随频率 (Voice A Freq)</label>
                    <div class="select-wrapper">
                        <select id="loopVoice1Freq_${i}">
                            <option value="inherit" selected>沿用设置 (Inherit)</option>
                            <option value="1">1/1 (同步)</option>
                            <option value="2">1/2 (两拍一次)</option>
                            <option value="3">1/3 (三拍一次)</option>
                            <option value="4">1/4 (四拍一次)</option>
                            <option value="5">1/5 (五拍一次)</option>
                            <option value="6">1/6 (六拍一次)</option>
                            <option value="random_high">高频随机 (High Freq Random)</option>
                            <option value="random_low">低频随机 (Low Freq Random)</option>
                        </select>
                    </div>
                </div>
                <div class="form-group" style="margin-bottom: 0;">
                    <label>角色 B 嗓音跟随频率 (Voice B Freq)</label>
                    <div class="select-wrapper">
                        <select id="loopVoice2Freq_${i}">
                            <option value="inherit" selected>沿用设置 (Inherit)</option>
                            <option value="1">1/1 (同步)</option>
                            <option value="2">1/2 (两拍一次)</option>
                            <option value="3">1/3 (三拍一次)</option>
                            <option value="4">1/4 (四拍一次)</option>
                            <option value="5">1/5 (五拍一次)</option>
                            <option value="6">1/6 (六拍一次)</option>
                            <option value="random_high">高频随机 (High Freq Random)</option>
                            <option value="random_low">低频随机 (Low Freq Random)</option>
                        </select>
                    </div>
                </div>
            `;
                loopGroupsContainer.appendChild(block);
            }
        }

        loopCountSelect.addEventListener('change', generateLoopGroups);
        generateLoopGroups(); // Initial render

        function playTrackAudio(trackId) {
            const voice = elements[trackId].voiceSelect.value;
            if (voice === "disabled") return;

            let src;
            let count;

            if (trackId === 1) { // Plaps
                count = 23;
                let randomNum;
                do {
                    randomNum = Math.floor(Math.random() * count) + 1;
                } while (randomNum === lastPlayed[trackId] && count > 1);
                lastPlayed[trackId] = randomNum;
                src = `plaps/plap_${randomNum}.wav`;

                // Visual Effects for Plaps
                createRipple();
                triggerShake();
            } else { // Voices
                const data = voiceData[voice];
                count = data.count;
                let randomNum;
                do {
                    randomNum = Math.floor(Math.random() * count) + 1;
                } while (randomNum === lastPlayed[trackId] && count > 1);
                lastPlayed[trackId] = randomNum;
                src = `Voice/${voice}/${voice}_${randomNum}.${data.ext}`;
            }

            const audio = new Audio(src);
            audio.volume = parseInt(elements[trackId].volSelect.value, 10) / 100.0;
            audio.play().catch(e => console.error(`Audio play failed (Track ${trackId}):`, e));
        }

        function getRatio(trackId) {
            let val = elements[trackId].freqSelect.value;

            if (isLoopMode && currentLoopIndex >= 0) {
                let loopVal;
                if (trackId === 2) loopVal = document.getElementById(`loopVoice1Freq_${currentLoopIndex}`).value;
                if (trackId === 3) loopVal = document.getElementById(`loopVoice2Freq_${currentLoopIndex}`).value;

                if (loopVal && loopVal !== "inherit") {
                    val = loopVal;
                }
            }

            if (val === "random_high") {
                const options = [1, 2, 3];
                return options[Math.floor(Math.random() * options.length)];
            }
            if (val === "random_low") {
                const options = [4, 5, 6];
                return options[Math.floor(Math.random() * options.length)];
            }
            return parseInt(val, 10);
        }

        function mainLoop() {
            if (!isPlaying) return;

            let intervalSec;

            if (isLoopMode) {
                if (loopTimeRemainingMs <= 0) {
                    const prevBlock = document.getElementById(`loopBlock_${currentLoopIndex}`);
                    if (prevBlock) prevBlock.classList.remove('active');

                    const count = parseInt(loopCountSelect.value, 10);
                    currentLoopIndex = (currentLoopIndex + 1) % count;

                    const currBlock = document.getElementById(`loopBlock_${currentLoopIndex}`);
                    if (currBlock) currBlock.classList.add('active');

                    const durationSec = parseInt(document.getElementById(`loopDuration_${currentLoopIndex}`).value, 10);
                    loopTimeRemainingMs = durationSec * 1000;
                }
                intervalSec = parseFloat(document.getElementById(`loopFreq_${currentLoopIndex}`).value);
            } else {
                intervalSec = parseFloat(elements[1].freqSelect.value);
            }

            const intervalMs = intervalSec * 1000;

            if (isLoopMode) {
                loopTimeRemainingMs -= intervalMs;
            }

            if (elements[1].voiceSelect.value !== "disabled") {
                playTrackAudio(1);
            }

            if (elements[2].voiceSelect.value !== "disabled") {
                if (tickCount >= nextTickTarget[2]) {
                    playTrackAudio(2);
                    nextTickTarget[2] = tickCount + getRatio(2);
                }
            }

            if (elements[3].voiceSelect.value !== "disabled") {
                if (tickCount >= nextTickTarget[3]) {
                    playTrackAudio(3);
                    nextTickTarget[3] = tickCount + getRatio(3);
                }
            }

            tickCount++;

            mainTimerId = setTimeout(mainLoop, intervalMs);
        }

        function stopAll() {
            isPlaying = false;
            isLoopMode = false;

            playBtn.textContent = '正常播放 (Normal Play)';
            playBtn.classList.remove('playing');

            executeLoopBtn.textContent = '执行循环 (Execute Loop)';
            executeLoopBtn.classList.remove('playing');

            const count = parseInt(loopCountSelect.value, 10);
            for (let i = 0; i < count; i++) {
                const block = document.getElementById(`loopBlock_${i}`);
                if (block) block.classList.remove('active');
            }

            if (mainTimerId) {
                clearTimeout(mainTimerId);
                mainTimerId = null;
            }
        }

        function startPlayback(loopMode) {
            if (isPlaying) stopAll(); // Stop any current playback

            isPlaying = true;
            isLoopMode = loopMode;

            lastPlayed = { 1: null, 2: null, 3: null };
            tickCount = 0;
            nextTickTarget = { 2: 0, 3: 0 };

            if (isLoopMode) {
                executeLoopBtn.textContent = '停止执行 (Stop)';
                executeLoopBtn.classList.add('playing');

                currentLoopIndex = -1; // starts at 0 initially since remaining time is 0
                loopTimeRemainingMs = 0;
            } else {
                playBtn.textContent = '停止 (Stop)';
                playBtn.classList.add('playing');
            }

            mainLoop();
        }

        playBtn.addEventListener('click', () => {
            if (isPlaying && !isLoopMode) stopAll();
            else startPlayback(false);
        });

        executeLoopBtn.addEventListener('click', () => {
            if (isPlaying && isLoopMode) stopAll();
            else startPlayback(true);
        });

        elements[1].voiceSelect.addEventListener('change', () => { lastPlayed[1] = null; });
        elements[2].voiceSelect.addEventListener('change', () => {
            lastPlayed[2] = null;
            if (isPlaying && elements[2].voiceSelect.value !== "disabled") {
                nextTickTarget[2] = tickCount;
            }
        });
        elements[3].voiceSelect.addEventListener('change', () => {
            lastPlayed[3] = null;
            if (isPlaying && elements[3].voiceSelect.value !== "disabled") {
                nextTickTarget[3] = tickCount;
            }
        });

        // Preset Button Logic
        document.getElementById('presetA').addEventListener('click', () => {
            elements[1].freqSelect.value = "0.3";
            elements[2].freqSelect.value = "random_low";
            elements[3].freqSelect.value = "random_low";
        });

        document.getElementById('presetB').addEventListener('click', () => {
            elements[1].freqSelect.value = "0.9";
            elements[2].freqSelect.value = "random_high";
            elements[3].freqSelect.value = "random_high";
        });

        document.getElementById('presetC').addEventListener('click', () => {
            loopCountSelect.value = "2";
            generateLoopGroups(); // Force DOM rebuild

            // Group 1: 15s Preset A
            document.getElementById('loopDuration_0').value = "15";
            document.getElementById('loopDurationVal_0').textContent = "15s";
            document.getElementById('loopFreq_0').value = "0.3";
            document.getElementById('loopVoice1Freq_0').value = "random_low";
            document.getElementById('loopVoice2Freq_0').value = "random_low";

            // Group 2: 10s Preset B
            document.getElementById('loopDuration_1').value = "10";
            document.getElementById('loopDurationVal_1').textContent = "10s";
            document.getElementById('loopFreq_1').value = "0.9";
            document.getElementById('loopVoice1Freq_1').value = "random_high";
            document.getElementById('loopVoice2Freq_1').value = "random_high";
        });

        // Effect Functions
        function createRipple() {
            const container = document.getElementById('ripple-container');
            if (!container) return;
            const ripple = document.createElement('div');
            ripple.className = 'ripple';
            container.appendChild(ripple);
            setTimeout(() => ripple.remove(), 1500);
        }

        function triggerShake() {
            const container = document.getElementById('ripple-container');
            if (!container) return;
            container.classList.remove('shake-active');
            void container.offsetWidth; // trigger reflow
            container.classList.add('shake-active');
        }

    </script>
</body>

</html>
